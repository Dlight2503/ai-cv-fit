# alembic.ini — Alembic configuration file
# DATABASE_URL được override bởi env.py từ environment variable
# Không cần chỉnh file này khi đổi DB

[alembic]
# Thư mục chứa migration scripts
script_location = alembic

# Định dạng tên file migration: timestamp_slug.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone cho tên file
timezone = UTC

# URL sẽ bị override bởi env.py — để placeholder ở đây
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/ai_cv_fit

# Output encoding
output_encoding = utf-8

[post_write_hooks]
# Tự format file migration với black (nếu cài)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
