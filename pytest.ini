[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Hiển thị output đầy đủ
addopts = 
    -v
    --tb=short
    --strict-markers

# Custom markers
markers =
    unit: unit tests, không cần DB thật
    integration: cần kết nối service thật
    slow: test chạy lâu
